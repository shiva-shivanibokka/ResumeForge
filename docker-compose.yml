# Local prod-like run of the backend (LibreOffice PDF export works here).
# Frontend runs separately with `npm run dev` (Vite) during development.
services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: dev
      ALLOWED_ORIGINS: "http://localhost:5173"
      # Provider keys are optional — users can also supply their own from the UI.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      DATABASE_URL: ${DATABASE_URL:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/api/health').status==200 else sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
