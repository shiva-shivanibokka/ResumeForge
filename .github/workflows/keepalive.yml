name: keep-alive

# Pings the backend (Hugging Face Space) and PDF converter (Render) health
# endpoints so the free tiers don't spin down on idle (which causes a slow
# cold-start on the next real visit).
# NOTE: GitHub's scheduled cron is best-effort (can be delayed) and is auto-
# disabled after 60 days with no repo commits — for rock-solid uptime, also set
# up an external monitor (see README / UptimeRobot). Update the URLs if a host changes.

on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes (< Render's 15-min idle window)
  workflow_dispatch: {} # allow manual runs

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API + converter health
        run: |
          ping() {
            for i in 1 2 3; do
              code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$1" || echo "000")
              echo "$1 attempt $i -> $code"
              [ "$code" = "200" ] && return 0
              sleep 15
            done
            return 1
          }
          ping https://shiva-1993-resumeforge-api.hf.space/api/health || exit 1
          ping https://resumeforgepdf.onrender.com/health || true
