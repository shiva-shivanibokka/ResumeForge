name: keep-alive

# Pings the Render health endpoint so the free-tier backend doesn't spin down
# after 15 min idle (which causes a slow 503 cold-start on the next real visit).
# NOTE: GitHub's scheduled cron is best-effort (can be delayed) and is auto-
# disabled after 60 days with no repo commits — for rock-solid uptime, also set
# up an external monitor (see README / UptimeRobot). Update the URL if the
# backend host changes.

on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes (< Render's 15-min idle window)
  workflow_dispatch: {} # allow manual runs

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health
        run: |
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 90 \
              https://resumeforge-api-pe93.onrender.com/api/health || echo "000")
            echo "attempt $i -> $code"
            [ "$code" = "200" ] && exit 0
            sleep 15
          done
          echo "health check did not return 200"
          exit 1
