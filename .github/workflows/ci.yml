name: CI

on:
  push:
    branches: [main, production-overhaul]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # LibreOffice so the PDF-conversion test actually runs (it self-skips otherwise).
      - name: Install LibreOffice
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libreoffice-writer fonts-dejavu

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio pytest-cov httpx

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Test (pytest + coverage)
        run: pytest --cov=app --cov-report=term-missing

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # The lockfile is generated on Windows and omits Linux-only native optional
      # deps (lightningcss/rollup), so both `npm ci` and a lockfile-constrained
      # `npm install` skip them and vite build can't load its Tailwind v4 config.
      # Drop the lockfile so npm resolves the correct platform binaries on Linux.
      - run: rm -f package-lock.json && npm install --no-audit --no-fund
      - name: Type-check
        run: npm run typecheck
      - name: Build
        run: npm run build
