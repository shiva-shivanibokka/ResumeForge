name: Deploy API to Hugging Face Space

# Auto-syncs backend/ to the HF Space on every push to main (and on demand).
# HF rebuilds the Docker image when the Space repo is updated.
# Requires a repo secret HF_TOKEN (a Hugging Face *write* access token).

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-hf-space.yml"
  workflow_dispatch: {}

concurrency:
  group: hf-space-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upload backend/ to the Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: shiva-1993/resumeforge-api
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::HF_TOKEN secret is missing. Add a Hugging Face *write* token under repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          pip install -q "huggingface_hub>=0.24"
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          api.upload_folder(
              repo_id=os.environ["HF_REPO"],
              repo_type="space",
              folder_path="backend",
              commit_message=f"Deploy from {os.environ.get('GITHUB_SHA', '')[:7]}",
              ignore_patterns=[
                  ".env",
                  "**/__pycache__/**",
                  "*.pyc",
                  ".pytest_cache/**",
                  ".ruff_cache/**",
                  "tests/**",
              ],
          )
          print(f"Uploaded backend/ to {os.environ['HF_REPO']} — HF will rebuild.")
          PY
