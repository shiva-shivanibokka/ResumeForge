# Render Blueprint: the LibreOffice DOCX→PDF converter only.
#
# The main API runs on Hugging Face Spaces (16 GB free — no 512 MB OOM); it is
# deployed from backend/ via .github/workflows/deploy-hf-space.yml. The API calls
# this converter over HTTP using PDF_SERVICE_URL. The frontend deploys to Vercel.
#
# Deploy: Render → New → Blueprint, pointed at this repo.
services:
  - type: web
    name: resumeforge-pdf
    runtime: docker
    plan: free
    dockerfilePath: ./pdf-service/Dockerfile
    dockerContext: ./pdf-service
    healthCheckPath: /health
